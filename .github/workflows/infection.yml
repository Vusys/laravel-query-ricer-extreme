name: Infection

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr:
    name: Mutation testing (PR diff)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite
          coverage: pcov
          tools: composer:v2

      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.composer/cache/files
          key: composer-infection-${{ hashFiles('composer.json') }}
          restore-keys: composer-infection-

      - name: Pin Laravel 12 for Infection compat
        run: |
          composer require --dev --no-update \
            "laravel/framework:^12.0" \
            "orchestra/testbench:^10.0"

      - name: Install dependencies (with Infection)
        run: |
          composer require --dev --no-update "infection/infection:^0.29"
          composer config --no-plugins allow-plugins.infection/extension-installer true
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run Infection (diff mode)
        run: |
          vendor/bin/infection \
            --git-diff-lines \
            --git-diff-base="origin/${{ github.base_ref }}" \
            --logger-github \
            --no-progress \
            --no-interaction \
            --threads=$(nproc)

  full:
    name: Mutation testing (full suite)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, pgsql]
        include:
          - { db: sqlite, db_connection: sqlite }
          - { db: pgsql,  db_connection: pgsql, db_host: '127.0.0.1', db_port: '5432', db_database: testing, db_username: postgres, db_password: password }

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Start database
        if: matrix.db != 'sqlite'
        run: |
          docker run -d --name database \
            -e POSTGRES_PASSWORD=password \
            -e POSTGRES_DB=testing \
            -p 5432:5432 \
            postgres:16

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, pdo_pgsql
          coverage: pcov
          tools: composer:v2

      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.composer/cache/files
          key: composer-infection-${{ hashFiles('composer.json') }}
          restore-keys: composer-infection-

      - name: Pin Laravel 12 for Infection compat
        run: |
          composer require --dev --no-update \
            "laravel/framework:^12.0" \
            "orchestra/testbench:^10.0"

      - name: Install dependencies (with Infection)
        run: |
          composer require --dev --no-update "infection/infection:^0.29"
          composer config --no-plugins allow-plugins.infection/extension-installer true
          composer update --prefer-dist --no-interaction --no-progress

      - name: Wait for database
        if: matrix.db != 'sqlite'
        run: timeout 60 bash -c 'until docker exec database pg_isready -U postgres -q 2>/dev/null; do sleep 2; done'

      - name: Run Infection (full suite)
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
          DB_CONNECTION: ${{ matrix.db_connection }}
          DB_HOST: ${{ matrix.db_host }}
          DB_PORT: ${{ matrix.db_port }}
          DB_DATABASE: ${{ matrix.db_database }}
          DB_USERNAME: ${{ matrix.db_username }}
          DB_PASSWORD: ${{ matrix.db_password }}
        run: |
          vendor/bin/infection \
            --logger-github \
            --no-progress \
            --no-interaction \
            --threads=$(nproc)

      - name: Upload Infection report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: infection-report-${{ matrix.db }}-${{ github.run_id }}
          path: build/infection/
          if-no-files-found: warn
          retention-days: 14
