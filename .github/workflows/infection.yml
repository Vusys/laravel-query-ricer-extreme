name: Infection

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr:
    name: Mutation testing (PR diff)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite
          coverage: pcov
          tools: composer:v2

      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.composer/cache/files
          key: composer-infection-${{ hashFiles('composer.json') }}
          restore-keys: composer-infection-

      - name: Pin Laravel 12 for Infection compat
        run: |
          composer require --dev --no-update \
            "laravel/framework:^12.0" \
            "orchestra/testbench:^10.0"

      - name: Install dependencies (with Infection)
        run: |
          composer require --dev --no-update "infection/infection:^0.29"
          composer config --no-plugins allow-plugins.infection/extension-installer true
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run Infection (diff mode)
        run: |
          vendor/bin/infection \
            --git-diff-lines \
            --git-diff-base="origin/${{ github.base_ref }}" \
            --logger-github \
            --no-progress \
            --no-interaction \
            --threads=$(nproc)

  full:
    name: Mutation testing (full suite)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite
          coverage: pcov
          tools: composer:v2

      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.composer/cache/files
          key: composer-infection-${{ hashFiles('composer.json') }}
          restore-keys: composer-infection-

      - name: Pin Laravel 12 for Infection compat
        run: |
          composer require --dev --no-update \
            "laravel/framework:^12.0" \
            "orchestra/testbench:^10.0"

      - name: Install dependencies (with Infection)
        run: |
          composer require --dev --no-update "infection/infection:^0.29"
          composer config --no-plugins allow-plugins.infection/extension-installer true
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run Infection (full suite)
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
        run: |
          vendor/bin/infection \
            --logger-github \
            --no-progress \
            --no-interaction \
            --threads=$(nproc)

      - name: Upload Infection report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: infection-report-${{ github.run_id }}
          path: build/infection/
          if-no-files-found: warn
          retention-days: 14
