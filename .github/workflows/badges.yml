name: Badges

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.composer/cache/files
          key: composer-badges-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-badges-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run tests with JUnit log
        env:
          DB_CONNECTION: sqlite
        run: vendor/bin/phpunit --log-junit junit.xml

      - name: Compute matrix size from tests.yml
        id: matrix
        run: |
          PHP_COUNT=$(yq '.jobs.test.strategy.matrix.php | length' .github/workflows/tests.yml)
          LARAVEL_COUNT=$(yq '.jobs.test.strategy.matrix.laravel | length' .github/workflows/tests.yml)
          DB_COUNT=$(yq '.jobs.test.strategy.matrix.db | length' .github/workflows/tests.yml)
          CELLS=$((PHP_COUNT * LARAVEL_COUNT * DB_COUNT))
          echo "cells=$CELLS" >> "$GITHUB_OUTPUT"
          echo "Matrix size: $PHP_COUNT × $LARAVEL_COUNT × $DB_COUNT = $CELLS"

      - name: Compute badge JSON
        run: php .github/scripts/compute-badge-metrics.php junit.xml badges-out "${{ steps.matrix.outputs.cells }}"

      - name: Publish to badges branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p /tmp/badge-staging
          cp badges-out/*.json /tmp/badge-staging/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads "${REMOTE}" badges >/dev/null 2>&1; then
            git fetch "${REMOTE}" badges --depth=1
            git checkout FETCH_HEAD
            rm -f ./*.json
          else
            git checkout --orphan badges
            git rm -rf . >/dev/null
          fi

          cp /tmp/badge-staging/*.json .
          git add ./*.json

          if git diff --cached --quiet; then
            echo "Badges unchanged; nothing to commit."
            exit 0
          fi

          git commit -m "chore(badges): refresh metrics from ${GITHUB_SHA::7}"
          git push "${REMOTE}" HEAD:badges
