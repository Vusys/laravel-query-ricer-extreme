name: Bencher

# Continuous performance tracking via bencher.dev.
#
# On push to master: runs the Performance suite (sqlite) and records
# the result as the new baseline for the master branch.
#
# On PR: runs the same benchmarks, compares against the master
# baseline, and posts a PR comment with the diff.
#
# Auth: requires BENCHER_API_KEY repo secret (set during signup at
# https://bencher.dev). Project slug is `vusys-laravel-query-ricer-extreme`.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  benchmark:
    name: Bencher
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.composer/cache/files
          key: composer-bencher-${{ hashFiles('composer.json') }}
          restore-keys: composer-bencher-

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Setup Bencher CLI
        uses: bencherdev/bencher@c247f48da9f1ec5bb9fa6a8787f1efeb16f3884e # main

      - name: Run Performance suite
        env:
          DB_CONNECTION: sqlite
        run: |
          set -o pipefail
          stdbuf -oL -eL vendor/bin/phpunit --testsuite Performance --testdox > perf.out 2> perf.err
          php .github/scripts/perf-to-bmf.php < perf.err > results.bmf.json
          echo "::group::BMF results"
          cat results.bmf.json
          echo "::endgroup::"

      - name: Upload baseline (master)
        if: github.event_name == 'push'
        env:
          BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
        run: |
          bencher run \
            --project vusys-laravel-query-ricer-extreme \
            --branch master \
            --testbed ubuntu-latest \
            --adapter json \
            --file results.bmf.json

      - name: Compare against baseline (PR)
        if: github.event_name == 'pull_request'
        env:
          BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bencher run \
            --project vusys-laravel-query-ricer-extreme \
            --branch "$GITHUB_HEAD_REF" \
            --start-point "$GITHUB_BASE_REF" \
            --start-point-hash '${{ github.event.pull_request.base.sha }}' \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed ubuntu-latest \
            --adapter json \
            --github-actions "$GITHUB_TOKEN" \
            --file results.bmf.json

      - name: Upload raw perf output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: perf-output-${{ github.run_id }}
          path: |
            perf.out
            perf.err
            results.bmf.json
          if-no-files-found: warn
          retention-days: 14
